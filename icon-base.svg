<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background rounded square -->
  <rect width="192" height="192" rx="36" fill="#6b4226"/>

  <!-- Raised bed body -->
  <rect x="26" y="106" width="140" height="52" rx="10" fill="#8b5e3c"/>
  <!-- Bed dividers -->
  <line x1="72" y1="106" x2="72" y2="158" stroke="#6b4226" stroke-width="2.5"/>
  <line x1="120" y1="106" x2="120" y2="158" stroke="#6b4226" stroke-width="2.5"/>

  <!-- Plant stems (left, centre, right) -->
  <line x1="49" y1="106" x2="49" y2="66" stroke="#4a7c59" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="96" y1="106" x2="96" y2="58" stroke="#4a7c59" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="143" y1="106" x2="143" y2="66" stroke="#4a7c59" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Leaves — left plant -->
  <ellipse cx="36" cy="76" rx="13" ry="7" transform="rotate(-30 36 76)" fill="#4a7c59"/>
  <ellipse cx="62" cy="70" rx="13" ry="7" transform="rotate(30 62 70)" fill="#4a7c59"/>

  <!-- Leaves — centre plant -->
  <ellipse cx="82" cy="70" rx="13" ry="7" transform="rotate(-30 82 70)" fill="#6ab04c"/>
  <ellipse cx="110" cy="64" rx="13" ry="7" transform="rotate(30 110 64)" fill="#6ab04c"/>

  <!-- Leaves — right plant -->
  <ellipse cx="130" cy="76" rx="13" ry="7" transform="rotate(-30 130 76)" fill="#4a7c59"/>
  <ellipse cx="156" cy="70" rx="13" ry="7" transform="rotate(30 156 70)" fill="#4a7c59"/>

  <!-- Sun top-left -->
  <circle cx="44" cy="38" r="16" fill="#f5c842"/>
  <g stroke="#f5c842" stroke-width="3" stroke-linecap="round">
    <line x1="44" y1="16" x2="44" y2="10"/>
    <line x1="44" y1="66" x2="44" y2="60"/>
    <line x1="22" y1="38" x2="16" y2="38"/>
    <line x1="72" y1="38" x2="66" y2="38"/>
    <line x1="28" y1="22" x2="24" y2="18"/>
    <line x1="64" y1="58" x2="60" y2="54"/>
    <line x1="60" y1="22" x2="64" y2="18"/>
    <line x1="24" y1="58" x2="28" y2="54"/>
  </g>
</svg>
